      - "10.200.44.0/24"
      - "10.200.45.0/24"
      - "10.200.46.0/24"
      - "10.44.0.0/16"
    
    # Classification IP 10.42 par modele
    ip_conditional:
      range: "10.42.0.0/16"
      include_models:
        - "NE8000"
        - "ASG"
        - "ASBR"
      exclude_models:
        - "NE9000"
        - "NE40E"
    
    # Attributs techniques MBH
    attributes:
      has_mpls: true
      has_isis: true
      role_priority:
        - "AGG"   # Aggregation
        - "DIST"  # Distribution

# ===========================================================
# Role-based classification (PE/P/AGG/DIST)
# Applique apres zone_classification
# ===========================================================
role_classification:
  
  # Provider Edge (PE) - Routeurs Backbone avec BGP externe
  PE:
    patterns:
      - sysDescr: ".*mx960.*"
      - sysDescr: ".*ne9000.*"
      - sysDescr: ".*ne40e.*"
      - hostname: ".*SR01$"
      - hostname: ".*SR02$"
    attributes:
      - has_bgp: true
      - has_mpls: true
      - zone: "backbone"
  
  # Core (P) - Routeurs coeur MPLS uniquement
  P:
    patterns:
      - sysDescr: ".*mx.*core.*"
      - sysDescr: ".*ne.*core.*"
    attributes:
      - has_mpls: true
      - has_bgp: false
      - zone: "backbone"
  
  # Aggregation (AGG) - Routeurs d'agregation MBH
  AGG:
    patterns:
      - sysDescr: ".*mx480.*"
      - sysDescr: ".*mx204.*"
      - sysDescr: ".*ne8000.*"
      - sysDescr: ".*ne5000.*"
      - hostname: ".*ASG.*"
      - hostname: ".*ASBR.*"
    attributes:
      - has_isis: true
      - has_mpls: true
      - zone: "mbh"
  
  # Distribution (DIST) - Routeurs de distribution
  DIST:
    patterns:
      - sysDescr: ".*mx104.*"
      - sysDescr: ".*ne.*dist.*"
      - hostname: "RAN_.*"
    attributes:
      - zone: "mbh"
