  - 10.44.0.0/16     # NE8000 MBH
  
  # Mixed range (classification by hostname/model)
  - 10.42.0.0/16     # NE9000/NE40E=Backbone; ASG/ASBR/NE8000=MBH

# ===========================================================
# Classification automatique Backbone vs MBH
# Base sur hostname, sysDescr, et plages IP
# ===========================================================
zone_classification:
  
  backbone:
    description: "Reseau Backbone - Juniper MX960 et Huawei NE9000/NE40E"
    
    # Patterns hostname pour Backbone
    hostname_patterns:
      - ".*SR01$"           # Juniper spine routers
      - ".*SR02$"
      - "(?!.*RAN_).*SR01"  # SR01/SR02 sans prefix RAN_
      - "(?!.*RAN_).*SR02"
    
    # Patterns sysDescr pour Backbone
    sysDescr_patterns:
      - ".*MX960.*"
      - ".*NE9000.*"        # Huawei NE9000
      - ".*NE40E.*"         # Huawei NE40E
    
    # Plages IP Backbone
    ip_ranges:
      - "10.200.240.0/24"
      - "10.200.241.0/24"
      - "10.40.0.0/16"
    
    # Classification IP 10.42 par modele
    ip_conditional:
      range: "10.42.0.0/16"
      include_models:
        - "NE9000"
        - "NE40E"
      exclude_models:
        - "NE8000"
        - "ASG"
        - "ASBR"
    
    # Attributs techniques Backbone
    attributes:
      has_bgp: true
      has_mpls: true
      has_isis: true
      role_priority:
        - "PE"    # Provider Edge
        - "P"     # Core
  
  mbh:
    description: "Mobile Backhaul - Huawei NE8000 et sites RAN"
    
    # Patterns hostname pour MBH
    hostname_patterns:
      - "RAN_.*"           # Tous les sites RAN
      - ".*ASG.*"          # Aggregation Service Gateway
      - ".*ASBR.*"         # AS Border Router
    
    # Patterns sysDescr pour MBH
    sysDescr_patterns:
      - ".*NE8000.*"       # Huawei NE8000 = MBH
      - ".*NE5000.*"
      - ".*MX480.*"
      - ".*MX204.*"
      - ".*MX104.*"
    
    # Plages IP MBH
    ip_ranges:
      - "10.200.1.0/24"
      - "10.200.2.0/24"
