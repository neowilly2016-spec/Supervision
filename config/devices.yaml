# ===========================================================
# Configuration SNMP Auto-Discovery
# Scan automatique des plages reseau - Classification par role
# ===========================================================

global:
  # Parametres SNMP
  snmp_version: 2c
  snmp_community: "{{ SNMP_DEFAULT_COMMUNITY }}"
  snmp_timeout: 5
  snmp_retries: 2
  
  # Discovery settings
  discovery_workers: 20
  discovery_schedule: "0 */6 * * *"  # Toutes les 6h
  lldp_discovery: true
  cdp_discovery: true
  
  # Polling intervals par role
  polling_interval:
    PE: 30      # Provider Edge: 30 sec
    P: 30       # Core: 30 sec
    AGG: 120    # Aggregation: 2 min
    DIST: 120   # Distribution: 2 min
    default: 300

# ===========================================================
# Plages reseau a scanner
# ===========================================================
network_ranges:
  - 10.200.0.0/16
  - 10.40.0.0/16
  - 10.42.0.0/16
  - 10.44.0.0/16

# ===========================================================
# Classification automatique par role
# Base sur sysDescr et autres attributs SNMP
# ===========================================================
role_classification:
  
  # Provider Edge (PE) - Routeurs Backbone avec BGP externe
  PE:
    patterns:
      - sysDescr: ".*mx960.*"
      - sysDescr: ".*ne9000.*backbone.*"
    attributes:
      - has_bgp: true
      - has_mpls: true
      - loopback_prefix: "10.200.0"
  
  # Core (P) - Routeurs coeur MPLS uniquement
  P:
    patterns:
      - sysDescr: ".*mx.*core.*"
      - sysDescr: ".*ne.*core.*"
    attributes:
      - has_mpls: true
      - has_bgp: false
  
  # Aggregation (AGG) - Routeurs d'agregation MBH
  AGG:
    patterns:
      - sysDescr: ".*mx480.*"
      - sysDescr: ".*mx204.*"
      - sysDescr: ".*ne9000.*agg.*"
      - sysDescr: ".*ne5000.*"
    attributes:
      - has_isis: true
      - has_mpls: true
  
  # Distribution (DIST) - Routeurs de distribution
  DIST:
    patterns:
      - sysDescr: ".*mx104.*"
      - sysDescr: ".*ne.*dist.*"
    attributes:
      - has_isis: true

# ===========================================================
# Detection automatique vendor et model
# ===========================================================
vendor_detection:
  juniper:
    patterns:
      - sysDescr: ".*juniper.*"
    models:
      MX960: ".*mx960.*"
      MX480: ".*mx480.*"
      MX204: ".*mx204.*"
      MX104: ".*mx104.*"
  
  huawei:
    patterns:
      - sysDescr: ".*huawei.*"
    models:
      NE9000: ".*ne9000.*"
      NE5000E: ".*ne5000e.*"
      NE5000: ".*ne5000[^e].*"

# ===========================================================
# Configuration gRPC (optionnel)
# ===========================================================
grpc:
  enabled: true
  auto_configure: true
  juniper_port: 32767
  huawei_port: 57400
  subscription_interval: 10

# ===========================================================
# Optimisations
# ===========================================================
optimizations:
  redis_cache:
    enabled: true
    ttl_default: 300
  
  timescaledb_compression:
    enabled: true
    compression_after_days: 7
  
  ml_anomaly_detection:
    enabled: true
    models:
      - bgp_flap_detection
      - isis_spf_anomaly
