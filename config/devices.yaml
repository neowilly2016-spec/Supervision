# ============================================================
# Inventaire des equipements reseau
# Backbone (Juniper MX) + MBH Zone 1 (Juniper) + MBH Zone 2 (Huawei NE9000 / Microwave)# ============================================================

devices:

  # ---- BACKBONE - Routeurs Juniper MX ----
  - hostname: MX-ALGER-PE1
    ip: 192.168.1.1
    type: router
    vendor: juniper
    model: MX480
    role: PE
    site: Alger
    region: Centre
    snmp:
      version: 2c
      community: public
    protocols:
      bgp: true
      isis: true
      mpls: true
      ldp: true
      rsvp: true
    tags: [backbone, pe, alger]

  - hostname: MX-ALGER-PE2
    ip: 192.168.1.2
    type: router
    vendor: juniper
    model: MX480
    role: PE
    site: Alger
    region: Centre
    snmp:
      version: 2c
      community: public
    protocols:
      bgp: true
      isis: true
      mpls: true
      ldp: true
      rsvp: true
    tags: [backbone, pe, alger]

  - hostname: MX-ORAN-PE1
    ip: 192.168.2.1
    type: router
    vendor: juniper
    model: MX240
    role: PE
    site: Oran
    region: Ouest
    snmp:
      version: 2c
      community: public
    protocols:
      bgp: true
      isis: true
      mpls: true
      ldp: true
      rsvp: true
