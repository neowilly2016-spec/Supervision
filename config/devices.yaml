# ===========================================================
# Configuration SNMP Auto-Discovery
# Scan automatique des plages reseau - Classification Backbone/MBH
# ===========================================================

global:
  
  # Parametres SNMP
  snmp_version: 2c
  snmp_community: "{{ SNMP_DEFAULT_COMMUNITY }}"
  snmp_timeout: 5
  snmp_retries: 2
  
  # Discovery settings
  discovery_workers: 20
  discovery_schedule: "0 */6 * * *"  # Toutes les 6h
  lldp_discovery: true
  cdp_discovery: true
  
  # Polling intervals par role
  polling_interval:
    PE: 30      # Provider Edge: 30 sec
    P: 30       # Core: 30 sec
    AGG: 120    # Aggregation: 2 min
    DIST: 120   # Distribution: 2 min
    default: 300

# ===========================================================
# Plages reseau a scanner
# ===========================================================
network_ranges:
  # Backbone ranges
  - 10.200.240.0/24  # Juniper SR01/SR02
  - 10.200.241.0/24  # Juniper SR01/SR02
  - 10.40.0.0/16     # NE9000/NE40E Backbone
  
  # MBH ranges
  - 10.200.1.0/24    # MBH RAN sites
  - 10.200.2.0/24
  - 10.200.3.0/24
  - 10.200.4.0/24
  - 10.200.5.0/24
