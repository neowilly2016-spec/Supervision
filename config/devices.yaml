# ===========================================================
# Configuration SNMP Auto-Discovery
# Scan automatique des plages reseau - Classification Backbone/MBH
# ===========================================================

global:
  
  # Parametres SNMP
  snmp_version: 2c
  snmp_community: "{{ SNMP_DEFAULT_COMMUNITY }}"
  snmp_timeout: 5
  snmp_retries: 2
  
  # Discovery settings
  discovery_workers: 20
  discovery_schedule: "0 */6 * * *"  # Toutes les 6h
  lldp_discovery: true
  cdp_discovery: true
  
  # Polling intervals par role
  polling_interval:
    PE: 30      # Provider Edge: 30 sec
    P: 30       # Core: 30 sec  
    AGG: 120    # Aggregation: 2 min
    DIST: 120   # Distribution: 2 min
    default: 300

# ===========================================================
# Plages reseau a scanner - TOUS LES SITES
# ===========================================================
network_ranges:
  # BACKBONE - Juniper Core Routers
  - 10.200.240.0/24  # SR01/SR02: MUSSR, BMRSR, CNE2SR, ORN1SR, etc.
  - 10.200.241.0/24  # SR01/SR02 suite
  
  # BACKBONE - Huawei NE9000/NE40E
  - 10.40.0.0/16     # ORG-IGW-NE9000, TOG-NE40E, etc.
  
  # MIXED - Classification conditionnelle
  - 10.42.0.0/16     # NE9000/NE40E=Backbone; ASG/ASBR/NE8000=MBH
  
  # MBH - Sites RAN Juniper  
  - 10.200.1.0/24    # RAN_ADR (Adrar)
  - 10.200.2.0/24    # RAN_AID (Ain Defla)
  - 10.200.3.0/24    # RAN_BBA (Bordj Bou Arreridj)
  - 10.200.4.0/24    # RAN_BBY (Bab-El-Oued)
  - 10.200.5.0/24    # RAN_BDL (Blida)
  - 10.200.6.0/24    # RAN_BEN (Beni Ouartilane)
  - 10.200.7.0/24    # RAN_BJA (Bejaia)
  - 10.200.8.0/24    # RAN_BLD (Blida)
  - 10.200.9.0/24    # RAN_BMA (Boumerdes)
  - 10.200.10.0/24   # RAN_BSK (Biskra)
  - 10.200.11.0/24   # RAN_CHL (Chlef)
  - 10.200.12.0/24   # RAN_CNE (Constantine)
  - 10.200.13.0/24   # RAN_EBA (El Bayadh)
  - 10.200.14.0/24   # RAN_TRT (Tiaret)
  - 10.200.15.0/24   # RAN_DJE (Djanet)
  - 10.200.16.0/24   # RAN_DRA (Adrar)
  - 10.200.17.0/24   # RAN_ELD (El Oued)
  - 10.200.18.0/24   # RAN_GDA (Guelma)
  - 10.200.19.0/24   # RAN_GLM (Guelma)
  - 10.200.20.0/24   # RAN_ILZ (Illizi)
  - 10.200.21.0/24   # RAN_KHA (Khenchela)
  - 10.200.22.0/24   # RAN_LAG (Laghouat)
  - 10.200.23.0/24   # RAN_MDA (Medea)
  - 10.200.24.0/24   # RAN_MGH (Maghnia)
  - 10.200.25.0/24   # RAN_MIL (Mila)
  - 10.200.26.0/24   # RAN_MSL (M'Sila)
  - 10.200.27.0/24   # RAN_MUA (Mostaganem)
  - 10.200.28.0/24   # RAN_NAM (Naama)
  - 10.200.29.0/24   # RAN_OGX (Ouargla)
  - 10.200.30.0/24   # RAN_ORN (Oran)
  - 10.200.31.0/24   # RAN_OUA (Ouargla)
  - 10.200.32.0/24   # RAN_RLZ (Relizane)
  - 10.200.33.0/24   # RAN_SAH (Saida)
  - 10.200.34.0/24   # RAN_SET (Setif)
  - 10.200.35.0/24   # RAN_SBA (Sidi Bel Abbes)
