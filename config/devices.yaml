# ===========================================================
# Configuration des plages de scan SNMP
# Performance Edition - Auto-discovery uniquement
# ===========================================================
# Les devices seront decouverts automatiquement par SNMP
# (hostname, IP, vendor, model extraits via sysDescr/sysName)
# ===========================================================

global:
  # Parametres SNMP
  snmp_version: 2c
  snmp_timeout: 5
  snmp_retries: 2
  
  # Polling intervals optimises par criticite
  polling_interval_critical: 30     # Backbone: 30 sec
  polling_interval_high: 120        # MBH: 2 min
  polling_interval_normal: 300      # Standard: 5 min
  
  # Discovery settings
  discovery_workers: 20              # Threads concurrents pour scan
  discovery_schedule: "0 */6 * * *"  # Cron: toutes les 6h
  lldp_discovery: true
  cdp_discovery: true

# ===========================================================
# Plages reseau a scanner
# ===========================================================
network_ranges:
  
  # Backbone + MBH Zone 1 (Juniper)
  - name: "Backbone-MBH-Zone1"
    network: "10.200.0.0/16"
    snmp_community: "{{ SNMP_DEFAULT_COMMUNITY }}"
    description: "Backbone Juniper MX960 + MBH Zone 1 Juniper MX480/MX204/MX104"
    zone: "Backbone-MBH-Zone1"
    vendor_hint: "juniper"
    priority: critical
    enabled: true
  
  # MBH Zone 2 (Huawei)
  - name: "MBH-Zone2"
    network: "10.44.0.0/16"
    snmp_community: "{{ SNMP_DEFAULT_COMMUNITY }}"
    description: "MBH Zone 2 Huawei NE9000/NE5000E"
    zone: "MBH-Zone2"
    vendor_hint: "huawei"
    priority: high
    enabled: true

# ===========================================================
# Regles d'identification automatique
# ===========================================================
device_identification:
  
  # Juniper
  juniper:
    patterns:
      - sysDescr: ".*juniper.*mx960.*"
        type: "Backbone"
        model: "MX960"
        role: "PE"
      - sysDescr: ".*juniper.*mx480.*"
        type: "MBH-Zone1"
        model: "MX480"
        role: "AGG"
      - sysDescr: ".*juniper.*mx204.*"
        type: "MBH-Zone1"
        model: "MX204"
        role: "AGG"
      - sysDescr: ".*juniper.*mx104.*"
        type: "MBH-Zone1"
        model: "MX104"
        role: "DIST"
  
  # Huawei
  huawei:
    patterns:
      - sysDescr: ".*huawei.*ne9000.*"
        type: "MBH-Zone2"
        model: "NE9000"
        role: "AGG"
      - sysDescr: ".*huawei.*ne5000e.*"
        type: "MBH-Zone2"
        model: "NE5000E"
        role: "AGG"

# ===========================================================
# Configuration gRPC (optionnel)
# ===========================================================
grpc:
  enabled: true
  auto_configure: true  # Activer gRPC sur devices decouverts
  juniper:
    port: 32767
    subscription_interval: 10
  huawei:
    port: 57400
    subscription_interval: 10

# ===========================================================
# Performance optimizations
# ===========================================================
optimizations:
  redis_cache:
    enabled: true
    ttl_default: 300
    ttl_bgp_peers: 300
    ttl_isis_adjacency: 300
    ttl_interfaces: 60
    ttl_mpls_lsp: 120
  
  timescaledb_compression:
    enabled: true
    compression_after_days: 7
    retention_policy:
      high_resolution: 7
      aggregates_5min: 30
      aggregates_1h: 365
  
  ml_anomaly_detection:
    enabled: true
    models:
      - bgp_flap_detection
      - isis_spf_anomaly
      - traffic_forecasting
    training_period_days: 30
