  # ---- BACKBONE - Routeurs Huawei NE9000 ----
  - hostname: NE9K-ALGER-P1
    ip: 192.168.1.10
    type: router
    vendor: huawei
    model: NE9000
    role: P
    site: Alger
    region: Centre
    snmp:
      version: 2c
      community: public
    protocols:
      bgp: true
      isis: true
      mpls: true
      ldp: true
      rsvp: true
      sr: true
    tags: [backbone, p, alger]

  - hostname: NE9K-ALGER-P2
    ip: 192.168.1.11
    type: router
    vendor: huawei
    model: NE9000
    role: P
    site: Alger
    region: Centre
    snmp:
      version: 2c
      community: public
    protocols:
      bgp: true
      isis: true
      mpls: true
      ldp: true
      rsvp: true
      sr: true
    tags: [backbone, p, alger]

  # ---- MBH - Aggregation Huawei ----
  - hostname: HW-ALGER-AGG1
    type: switch    loopback: 10.44.16.1
    zone: MBH-Zone2
    vendor: huawei
    model: CE6870
    role: MBH-AGG
    site: Alger
    region: Centre
    snmp:
      version: 2c
    protocols:      community: mobilis-read-only
      bgp: false
      isis: true
      mpls: true
    tags: [mbh, aggregation, alger]

  - hostname: HW-ORAN-AGG1
    loopback: 10.44.31.1
    zone: MBH-Zone2
    type: switch
    vendor: huawei
    model: CE6870
    role: MBH-AGG
    site: Oran
    region: Ouest
    snmp:
      version: 2c
      mpls: true
      community: mobilis-read-only
    protocols:
    tags: [mbh, aggregation, oran]

  # ---- MBH - Liens Microwave ----
  - hostname: MW-ALGER-SITE001
    ip: 10.20.1.1
    zone: MBH-Zone1
    type: microwave
    vendor: ericsson
    model: MINI-LINK
    role: MBH-MW
    site: Alger-Site001
    region: Centre
    snmp:
      version: 2c
    mbh_params:      community: mpbn
      frequency_ghz: 18
      modulation: 256QAM
      capacity_mbps: 400
      far_end_ip: 10.20.1.2
      far_end_hostname: MW-ALGER-SITE001-FAR
    tags: [mbh, microwave, alger]

  - hostname: MW-ALGER-SITE002
    ip: 10.20.2.1
    loopback: 10.200.16.2  # Zone 1 - Wilaya 16 (Alger)
    zone: MBH-Zone1
    type: microwave
    vendor: huawei
    model: OptiX-RTN-950A
    role: MBH-MW
    site: Alger-Site002
    region: Centre
    snmp:
      version: 2c
      community: public
    mbh_params:
      frequency_ghz: 23
      modulation: 128QAM
      capacity_mbps: 200
      far_end_ip: 10.20.2.2
      far_end_hostname: MW-ALGER-SITE002-FAR
    tags: [mbh, microwave, alger]
